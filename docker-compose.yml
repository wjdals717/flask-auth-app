version: "3.8"

services:
    # 1. 플라스크 컨테이너
    flask-app:
        build: .
        restart: always
        # 외부 포트 노출 안 함 (Nginx랑 내부적으로만 통신)
        expose:
            - "5000"

    # 2. 엔지닉스 컨테이너
    nginx:
        image: nginx:latest
        ports:
            - "80:80"
        volumes:
            - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
        depends_on:
            - flask-app
        restart: always
